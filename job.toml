# 正式任务配置
# 当前配置覆盖 /datas/1-2月 目录下实际存在记录的所有客户群体。
# 后续新增来源文件、客户群体或输出任务，直接改这个文件。
#
# 运行方式：
# uv run python survey_stats.py --config job.toml
#
# 只校验不落文件：
# uv run python survey_stats.py --config job.toml --dry-run

output_dir = "输出结果"
output_format = "xlsx"

# 计算口径：
# - template: 按 survey_stats.py 模板原样计算（默认）
# - summary: 按汇总表灰格/非灰格重组二级指标后再计算
calculation_mode = "template"

[[jobs]]
name = "展览主承办"
path = "datas/1-2月/展览.xlsx"
sheet = "问卷数据"
template = "organizer"
role_name = "展览主承办"

