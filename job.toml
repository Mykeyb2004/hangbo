# 正式任务配置
# 后续新增来源文件、客户群体或输出任务，直接改这个文件。
#
# 运行方式：
# uv run python survey_stats.py --config job.toml
#
# 只校验不落文件：
# uv run python survey_stats.py --config job.toml --dry-run

output_dir = "输出结果"
output_format = "xlsx"

# 如果后面还有其他来源文件，继续往下加：
#
#[[jobs]]
#name = "会议主承办"
#path = "1-2月原始数据/会议-2.xlsx"
#sheet = "问卷数据"
#template = "..."
#role_name = "会议主承办"

[[jobs]]
name = "展览主承办"
path = "1-2月原始数据/展览-2.xlsx"
sheet = "问卷数据"
template = "organizer"
role_name = "展览主承办"

[[jobs]]
name = "参展商"
path = "1-2月原始数据/展览-2.xlsx"
sheet = "问卷数据"
template = "exhibitor"
role_name = "参展商"

[[jobs]]
name = "专业观众"
path = "1-2月原始数据/展览-2.xlsx"
sheet = "问卷数据"
template = "visitor"
role_name = "专业观众"

[[jobs]]
name = "会展服务商"
path = "1-2月原始数据/7月会展服务商.xlsx"
sheet = "问卷数据"
template = "service_provider"
role_name = "会展服务商"

