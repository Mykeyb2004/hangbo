# 1-2 月批量统计任务配置
#
# 运行方式：
# uv run python survey_stats.py --config job01-02.toml
#
# 只校验不落文件：
# uv run python survey_stats.py --config job01-02.toml --dry-run
#
# 说明：
# - 当前只包含 datas/1-2月 下“survey_stats.py 已支持模板”且“问卷数据 中实际有记录”的客户群体
# - datas/1-2月/会议.xlsx 中当前未发现“酒店会议主承办 / 酒店参会客户”记录
# - datas/1-2月/酒店.xlsx 中当前未发现“散客”记录
# - datas/1-2月/餐饮.xlsx 中当前未发现“特色美食廊 / 旅游团餐 / 婚宴”记录

output_dir = "输出结果/1-2月"
output_format = "xlsx"
calculation_mode = "template"

[[jobs]]
name = "展览主承办"
path = "datas/1-2月/展览.xlsx"
sheet = "问卷数据"
template = "organizer"
role_name = "展览主承办"

[[jobs]]
name = "参展商"
path = "datas/1-2月/展览.xlsx"
sheet = "问卷数据"
template = "exhibitor"
