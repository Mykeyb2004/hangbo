# 1-2 月批量统计任务配置
#
# 运行方式：
# uv run python survey_stats.py --config job01-02.toml
#
# 只校验不落文件：
# uv run python survey_stats.py --config job01-02.toml --dry-run
#
# 说明：
# - 使用目录模式：自动扫描 datas/1-2月 下标准来源文件
# - 当前只会处理 survey_stats.py 已支持的 18 类模板客户
# - 缺少来源文件或身份值无匹配的客户类型，会在结尾统一提示，不生成空白文件

output_dir = "输出结果/1-2月"
output_format = "xlsx"
calculation_mode = "template"
input_dir = "datas/1-2月"
