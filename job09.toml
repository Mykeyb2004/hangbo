# 9 月批量统计任务配置
#
# 运行方式：
# uv run python survey_stats.py --config job09.toml
#
# 只校验不落文件：
# uv run python survey_stats.py --config job09.toml --dry-run
#
# 说明：
# - 当前只包含 datas/9月 下“survey_stats.py 已支持模板”且“问卷数据 中实际有记录”的客户群体
# - datas/9月/旅游.xlsx 暂未纳入，因为 survey_stats.py 目前没有“游客 / 旅行社工作人员”模板

output_dir = "输出结果/9月"
output_format = "xlsx"
calculation_mode = "template"

[[jobs]]
name = "展览主承办"
path = "datas/9月/展览.xlsx"
sheet = "问卷数据"
template = "organizer"
role_name = "展览主承办"

[[jobs]]
name = "参展商"
path = "datas/9月/展览.xlsx"
sheet = "问卷数据"
