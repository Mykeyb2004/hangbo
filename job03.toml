# 3 月批量统计任务配置
#
# 运行方式：
# uv run python survey_stats.py --config job03.toml
#
# 只校验不落文件：
# uv run python survey_stats.py --config job03.toml --dry-run
#
# 说明：
# - 使用目录模式：自动扫描 datas/3月 下标准来源文件
# - datas/3月/旅游.xlsx 仍不会纳入，因为 survey_stats.py 目前没有“游客 / 旅行社工作人员”模板
# - 缺少来源文件或身份值无匹配的客户类型，会在结尾统一提示，不生成空白文件

output_dir = "输出结果/3月"
output_format = "xlsx"
calculation_mode = "template"
input_dir = "datas/3月"
